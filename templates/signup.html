{% extends "base.html" %}
{% block title %}Sign Up - TV Tracker{% endblock %}
{% block head_extra %}
<style>
    .auth-wrapper {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 40px 20px;
        min-height: calc(100vh - 80px);
    }
    .auth-card {
        background: var(--bg-card);
        border-radius: var(--radius-lg);
        padding: 48px 40px;
        width: 100%;
        max-width: 420px;
        box-shadow: 0 20px 60px rgba(0,0,0,.5);
        border: 1px solid var(--border);
    }
    .auth-card h1 {
        font-size: 28px;
        font-weight: 700;
        margin-bottom: 6px;
        text-align: center;
    }
    .auth-card .subtitle {
        text-align: center;
        color: var(--text-secondary);
        font-size: 14px;
        margin-bottom: 28px;
    }
    .auth-form { display: flex; flex-direction: column; gap: 18px; }
    .auth-form .form-group { display: flex; flex-direction: column; gap: 6px; }
    .auth-form .form-group label {
        font-size: 13px;
        color: var(--text-secondary);
        font-weight: 500;
    }
    .auth-form input {
        width: 100%;
        padding: 14px 16px;
        font-size: 16px;
    }
    .auth-form button[type="submit"] {
        padding: 14px;
        font-size: 16px;
        font-weight: 700;
        margin-top: 4px;
        background: var(--accent);
        color: #fff;
        border: none;
        border-radius: var(--radius);
        cursor: pointer;
        transition: all var(--transition);
    }
    .auth-form button[type="submit"]:hover {
        background: var(--accent-hover);
        transform: translateY(-1px);
    }
    .auth-card .auth-footer {
        text-align: center;
        margin-top: 24px;
        font-size: 14px;
        color: var(--text-dim);
    }
    .auth-card .auth-footer a { color: #fff; font-weight: 600; }
    .auth-card .auth-footer a:hover { text-decoration: underline; }

    @media (max-width: 768px) {
        .auth-card { padding: 32px 24px; }
    }
</style>
{% endblock %}
{% block content %}
<div class="auth-wrapper">
    <div class="auth-card">
        <h1>Create Account</h1>
        <p class="subtitle">Start tracking your shows and movies</p>
        <form method="POST" class="auth-form">
            <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Choose a username" value="{{ username or '' }}" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Choose a password (min 6 chars)" required>
            </div>
            <div class="form-group">
                <label for="password_confirm">Confirm Password</label>
                <input type="password" id="password_confirm" name="password_confirm" placeholder="Re-enter your password" required>
            </div>
            <button type="submit">Create Account</button>
        </form>
        <p class="auth-footer">Already have an account? <a href="/login">Log in</a></p>
    </div>
</div>
{% endblock %}

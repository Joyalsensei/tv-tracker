{% extends "base.html" %}
{% block title %}Page Not Found - TV Tracker{% endblock %}
{% block head_extra %}
<style>
    .error-wrapper {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 60px 20px;
        min-height: calc(100vh - 200px);
    }
    .error-card {
        text-align: center;
        max-width: 480px;
    }
    .error-card .error-code {
        font-size: 96px;
        font-weight: 800;
        color: var(--accent);
        line-height: 1;
        margin-bottom: 8px;
        opacity: 0.6;
    }
    .error-card h1 {
        font-size: 28px;
        font-weight: 700;
        margin-bottom: 8px;
    }
    .error-card p {
        color: var(--text-secondary);
        font-size: 15px;
        line-height: 1.6;
        margin-bottom: 28px;
    }
    .error-card .btn {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 12px 28px;
        font-size: 15px;
        font-weight: 600;
        border-radius: var(--radius);
        background: var(--accent);
        color: #fff;
        border: none;
        cursor: pointer;
        transition: all var(--transition);
        text-decoration: none;
    }
    .error-card .btn:hover {
        background: var(--accent-hover);
        transform: translateY(-2px);
    }
</style>
{% endblock %}
{% block content %}
<div class="error-wrapper">
    <div class="error-card">
        <div class="error-code">404</div>
        <h1>Page Not Found</h1>
        <p>The page you're looking for doesn't exist or has been moved.<br>
        Let's get you back on track.</p>
        <a href="/" class="btn">🏠 Go Home</a>
    </div>
</div>
{% endblock %}

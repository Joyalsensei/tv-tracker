<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#141414"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- TV icon -->
  <g transform="translate(256,240)">
    <!-- Screen -->
    <rect x="-140" y="-100" width="280" height="180" rx="16" fill="#e50914" opacity="0.15"/>
    <rect x="-120" y="-85" width="240" height="150" rx="10" fill="#e50914"/>
    <!-- Play button -->
    <polygon points="-30,-40 30,0 -30,40" fill="white"/>
    <!-- Antenna -->
    <line x1="0" y1="-100" x2="0" y2="-130" stroke="#e50914" stroke-width="8" stroke-linecap="round"/>
    <line x1="-30" y1="-130" x2="30" y2="-130" stroke="#e50914" stroke-width="6" stroke-linecap="round"/>
    <!-- Stand legs -->
    <line x1="-80" y1="80" x2="-40" y2="120" stroke="#e50914" stroke-width="8" stroke-linecap="round"/>
    <line x1="80" y1="80" x2="40" y2="120" stroke="#e50914" stroke-width="8" stroke-linecap="round"/>
    <!-- Base -->
    <line x1="-60" y1="120" x2="60" y2="120" stroke="#e50914" stroke-width="6" stroke-linecap="round"/>
  </g>
</svg>
